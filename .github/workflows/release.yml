name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build release artifacts
        run: python scripts/build_release.py

      - name: Determine release channel
        id: channel
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match "-") {
            "is_prerelease=true" >> $env:GITHUB_OUTPUT
            "make_latest=false" >> $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" >> $env:GITHUB_OUTPUT
            "make_latest=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: |
            dist/TokenScope-v*-windows-x64.exe
            dist/TokenScopeUpdater-v*-windows-x64.exe
            dist/SHA256SUMS.txt
